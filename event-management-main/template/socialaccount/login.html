{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign In - Evently</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100 justify-content-center align-items-center bg-light">
    <div class="container my-5 p-4 p-md-5 bg-white rounded-3 shadow-sm" style="max-width: 500px;">
        <div class="text-center mb-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 48px;" class="mb-3">
            <h1 class="h3 mb-3 fw-bold text-dark">Sign In Via Google</h1>
            <p class="text-muted">You are about to sign in using your Google account. This will securely verify your identity.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg fw-bold py-3 shadow-sm">
                    Continue with Google
                </button>
                <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-muted mt-2">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
